<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odessa District 4-Year Safety Plan Maps</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        h2 {
            text-align: left;
            margin-top: 40px;
            color: #333;
        }
        .map-container {
            margin-bottom: 40px;
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        iframe {
            width: 100%;
            height: 500px;
            border: 0;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <h1>Crash & Safety Analysis Maps</h1>

    <div class="map-container">
        <h2>Top Fatal Corridors</h2>
        <iframe src="https://www.google.com/maps/d/u/0/embed?mid=1iJ22kiAykkdeb0IxvYo1avril0bm1vI"></iframe>
    </div>

    <div class="map-container">
        <h2>Roadway and Lane Departure</h2>
        <iframe src="https://www.google.com/maps/d/u/0/embed?mid=1f_1PTplYzYHA57OgY-FjTNMs-nxZARI"></iframe>
    </div>

    <div class="map-container">
        <h2>Vulnerable Road User</h2>
        <iframe src="https://www.google.com/maps/d/u/0/embed?mid=1pc_VC2VMr8n2qB7nBnOqMlEnCkS5mCU"></iframe>
    </div>

    <div class="map-container">
        <h2>Dark Not-Lighted</h2>
        <iframe src="https://www.google.com/maps/d/u/0/embed?mid=1SFtppiG7L8sm9l2_G7k1R12d8sDXAmM"></iframe>
    </div>

</body>
</html>
